<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">
        <div class="sidebar-menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/admin/admin_dashboard}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Dashboard</a>

            <a th:href="@{/admin/user/allUsers}"
               class="menu-item active menu-link whitespace-nowrap px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                Manage Users
            </a>

            <a th:href="@{/admin/task/allTasks}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Tasks</a>
            <a th:href="@{/admin/attendance/allRecords}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Attendance Reports</a>
            <a th:href="@{/admin/performance/details}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Performance Reports</a>
            <a th:href="@{/admin/settings/page}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Settings</a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">Manage Users</div>
                <div class="sub-welcome text-gray-500 text-sm">Create, update, and manage employee accounts</div>
            </div>

            <a th:href="@{/admin/user/addUserPage}"
               class="logout-btn menu-link w-full sm:w-auto px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition shadow-sm text-center">
                Add User
            </a>
        </div>

        <div class="tasks-monitoring-section mt-4 bg-white rounded-2xl shadow p-5">

            <div class="section-title font-semibold text-lg mb-4">Filters</div>

            <div class="filter-row flex flex-col md:flex-row gap-4">

                <input type="text" id="search" placeholder="Search by name or email"
                       class="md:w-[300px] px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">

                <select id="role"
                        class="md:w-40 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="ALL">All Roles</option>
                    <option value="ADMIN">Admin</option>
                    <option value="EMPLOYEE">Employee</option>
                </select>

                <select id="status"
                        class="md:w-40 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="ALL">All Status</option>
                    <option value="ACTIVE">Active</option>
                    <option value="INACTIVE">Inactive</option>
                </select>

            </div>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-4 overflow-x-auto">

            <div class="section-title font-semibold text-lg mb-3">User Records</div>

            <div class="task-items-group grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"
                 id="table-data">

                <div th:if="${users == null or #lists.isEmpty(users)}"
                     class="col-span-full bg-slate-50 rounded-3xl p-12 text-center">

                    <div class="text-4xl mb-3">
                        👥
                    </div>

                    <h3 class="text-xl font-semibold text-gray-700">
                        No users found
                    </h3>

                    <p class="text-gray-500 mt-2">
                        Try changing filters
                    </p>

                </div>

                <div th:each="user : ${users}"
                     class="bg-white border border-gray-200 rounded-2xl p-5 hover:shadow-md transition duration-200">

                    <div class="flex justify-between items-start">

                        <div>

                            <h3 class="font-bold text-lg text-gray-800"
                                th:text="${user.fullName}">
                            </h3>

                            <p class="text-sm text-gray-500 mt-1"
                               th:text="${user.email}">
                            </p>

                        </div>

                    </div>

                    <div class="flex gap-2 mt-4 flex-wrap">

            <span th:if="${user.role != null and user.role.equalsIgnoreCase('ADMIN')}"
                  class="px-3 py-1 rounded-full bg-purple-100 text-purple-700 text-xs font-semibold">
                Admin
            </span>

                        <span th:if="${user.role != null and user.role.equalsIgnoreCase('EMPLOYEE')}"
                              class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold">
                Employee
            </span>

                        <span th:if="${user.status != null and user.status.equalsIgnoreCase('ACTIVE')}"
                              class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold">
                Active
            </span>

                        <span th:if="${user.status != null and user.status.equalsIgnoreCase('INACTIVE')}"
                              class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold">
                Inactive
            </span>

                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">

                        <a th:href="@{/admin/user/{userId}/editPage(userId=${user.id})}"
                           class="text-center px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                            Edit
                        </a>

                        <a th:if="${user.role!=null and user.role.equalsIgnoreCase('employee')}"
                           th:href="@{/admin/user/{userId}/resetPasswordPage(userId=${user.id})}"
                           class="text-center px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                            Reset
                        </a>

                        <button th:if="${user.status!=null and user.status.equalsIgnoreCase('active')}"
                                th:onclick="'deactivateUser(' + ${user.id} + ')'"
                                class="col-span-2 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                            Deactivate User
                        </button>

                        <button th:if="${user.status!=null and user.status.equalsIgnoreCase('inactive')}"
                                th:onclick="'activateUser(' + ${user.id} + ')'"
                                class="col-span-2 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                            Activate User
                        </button>

                    </div>

                </div>

            </div>
        </div>

        <div class="pagination-section mt-6 flex flex-col sm:flex-row justify-between items-center gap-3 bg-white p-4 rounded-xl shadow">

            <div class="label text-sm text-gray-500"
                 th:if="${totalPages > 0}"
                 th:text="'Page ' + (${currentPage + 1}) + ' of ' + ${totalPages}">
            </div>

            <div class="pagination-btn flex gap-2">
                <a class="view-btn menu-link px-3 py-1 rounded-lg border bg-gray-50 hover:bg-gray-100 transition"
                   th:if="${currentPage > 0}"
                   th:href="@{/admin/user/allUsers(page=${currentPage - 1}, size=10)}">
                    Previous
                </a>

                <a class="view-btn menu-link px-3 py-1 rounded-lg border bg-gray-50 hover:bg-gray-100 transition"
                   th:if="${currentPage < totalPages-1}"
                   th:href="@{/admin/user/allUsers(page=${currentPage + 1}, size=10)}">
                    Next
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    document.querySelectorAll("form").forEach(form => {
        form.addEventListener("submit", function(e){
            if(!confirm("Are you sure?")){
                e.preventDefault();
            }
        });
    });

    document.getElementById("search").addEventListener("keyup", () => fetchData(0));
    document.getElementById("role").addEventListener("change", () => fetchData(0));
    document.getElementById("status").addEventListener("change", () => fetchData(0));

    function fetchData(page = 0){
        let searchValue = document.getElementById("search").value;
        let roleValue = document.getElementById("role").value;
        let statusValue = document.getElementById("status").value;

        let url = `/admin/user/filter?search=${encodeURIComponent(searchValue)}&role=${roleValue}&status=${statusValue}&page=${page}&size=10`;

        fetch(url)
            .then(res => {
                if(!res.ok) throw new Error("Failed");
                return res.json();
            })
            .then(data => {
                display(data.content);
                updatePagination(data);
            })
            .catch(err => console.error(err));
    }

    function updatePagination(data){
        let container = document.querySelector(".pagination-section");
        let html = "";

        if(data.totalPages > 0){
            html += `<div class="label text-sm text-gray-500">
                        Page ${data.number + 1} of ${data.totalPages}
                     </div>`;
        }

        html += `<div class="pagination-btn flex gap-2">`;

        if(data.number > 0){
            html += `<button class="px-3 py-1 rounded-lg border bg-gray-50 hover:bg-gray-100 transition"
                        onclick="fetchData(${data.number - 1})">Previous</button>`;
        }

        if(data.number < data.totalPages - 1){
            html += `<button class="px-3 py-1 rounded-lg border bg-gray-50 hover:bg-gray-100 transition"
                        onclick="fetchData(${data.number + 1})">Next</button>`;
        }

        html += `</div>`;

        container.innerHTML = html;
    }

    function display(data){

        let displayContainer =
            document.getElementById("table-data");

        if(data.length === 0){

            displayContainer.innerHTML = `
                <div class="col-span-full bg-slate-50 rounded-3xl p-12 text-center">

                    <div class="text-4xl mb-3">
                        👥
                    </div>

                    <h3 class="text-xl font-semibold text-gray-700">
                        No users found
                    </h3>

                    <p class="text-gray-500 mt-2">
                        Try changing filters
                    </p>

                </div>
            `;

            return;
        }

        let html = "";

        data.forEach(user => {

            let roleBadge =
                user.role === "ADMIN"
                ? `<span class="px-3 py-1 rounded-full bg-purple-100 text-purple-700 text-xs font-semibold">
                        Admin
                   </span>`
                : `<span class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold">
                        Employee
                   </span>`;

            let statusBadge =
                user.status === "ACTIVE"
                ? `<span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold">
                        Active
                   </span>`
                : `<span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold">
                        Inactive
                   </span>`;

            let resetButton =
                user.role === "EMPLOYEE"
                ? `
                    <a href="/admin/user/${user.id}/resetPasswordPage"
                       class="text-center px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                        Reset
                    </a>
                  `
                : '';

            let actionButton =
                user.status === "ACTIVE"
                ? `
                    <button
                        onclick="deactivateUser(${user.id})"
                        class="col-span-2 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                        Deactivate User
                    </button>
                  `
                : `
                    <button
                        onclick="activateUser(${user.id})"
                        class="col-span-2 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                        Activate User
                    </button>
                  `;

            html += `

                <div class="bg-white border border-gray-200 rounded-2xl p-5 hover:shadow-md transition duration-200">

                    <h3 class="font-bold text-lg text-gray-800">
                        ${user.fullName}
                    </h3>

                    <p class="text-sm text-gray-500 mt-1">
                        ${user.email}
                    </p>

                    <div class="flex gap-2 mt-4 flex-wrap">
                        ${roleBadge}
                        ${statusBadge}
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">

                        <a href="/admin/user/${user.id}/editPage"
                           class="text-center px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-200 transition duration-200">
                            Edit
                        </a>

                        ${resetButton}

                        ${actionButton}

                    </div>

                </div>

            `;
        });

        displayContainer.innerHTML = html;
    }

    function activateUser(userId){

        Swal.fire({
            title: 'Activate User?',
            text: 'User will be activated',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Activate',
            reverseButtons: true
        }).then((result) => {

            if(result.isConfirmed){

                fetch(`/admin/user/${userId}/activate`, { method: "POST" })
                    .then(res => {
                        if(!res.ok) throw new Error();

                        Swal.fire({
                            icon: 'success',
                            title: 'User Activated',
                            showConfirmButton: false,
                            timer: 1500
                        });

                        fetchData(0); // refresh table
                    })
                    .catch(() => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Something went wrong'
                        });
                    });
            }
        });
    }

    function deactivateUser(userId){

        Swal.fire({
            title: 'Deactivate User?',
            text: 'User will be deactivated',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Deactivate',
            reverseButtons: true
        }).then((result) => {

            if(result.isConfirmed){

                fetch(`/admin/user/${userId}/deactivate`, { method: "POST" })
                    .then(res => {
                        if(!res.ok) throw new Error();

                        Swal.fire({
                            icon: 'success',
                            title: 'User Deactivated',
                            showConfirmButton: false,
                            timer: 1500
                        });

                        fetchData(0); // refresh table
                    })
                    .catch(() => {
                        Swal.fire({
                            icon: 'error',
                            title: 'Something went wrong'
                        });
                    });
            }
        });
    }
</script>

</body>
</html>
