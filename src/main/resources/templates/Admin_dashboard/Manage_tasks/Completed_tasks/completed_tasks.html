<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Completed Tasks</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
    </head>

        <body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

        <div class="flex flex-col md:flex-row min-h-screen">

            <!-- Sidebar -->

            <div class="w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

                <div class="mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

                    <a th:href="@{/admin/admin_dashboard}"
                       class="px-4 py-2 rounded-xl hover:bg-gray-100">
                        Dashboard
                    </a>

                    <a th:href="@{/admin/user/allUsers}"
                       class="px-4 py-2 rounded-xl hover:bg-gray-100">
                        Manage Users
                    </a>

                    <a th:href="@{/admin/task/allTasks}"
                       class="px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                        Tasks
                    </a>

                    <a th:href="@{/admin/attendance/allRecords}"
                       class="px-4 py-2 rounded-xl hover:bg-gray-100">
                        Attendance Reports
                    </a>

                    <a th:href="@{/admin/performance/details}"
                       class="px-4 py-2 rounded-xl hover:bg-gray-100">
                        Performance Reports
                    </a>

                    <a th:href="@{/admin/settings/page}"
                       class="px-4 py-2 rounded-xl hover:bg-gray-100">
                        Settings
                    </a>

                </div>

            </div>

            <!-- Main Content -->

            <div class="flex-1 p-4 md:p-6">

                <!-- Header -->

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">

                    <div>

                        <h1 class="text-3xl font-bold text-gray-800">
                            Completed Tasks
                        </h1>

                        <p class="text-gray-500 mt-1">
                            View all completed tasks and analyze submission performance
                        </p>

                    </div>

                    <a th:href="@{/admin/task/allTasks}"
                       class="px-5 py-2.5 rounded-xl bg-white border hover:bg-gray-50 transition shadow-sm">
                        Back to Tasks
                    </a>

                </div>

                <!-- Filters -->

                <div class="bg-white rounded-3xl shadow p-6 mb-6">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                        <input
                                type="text"
                                id="search"
                                placeholder="Search task title..."
                                class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">

                        <select id="userFilter"
                                class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">

                            <option value="">
                                All Employees
                            </option>

                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.fullName}">
                            </option>

                        </select>

                        <select id="completionType"
                                class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">

                            <option value="ALL">
                                All Tasks
                            </option>

                            <option value="ON_TIME">
                                On Time
                            </option>

                            <option value="LATE">
                                Late
                            </option>

                        </select>

                    </div>

                </div>

                <!-- Tasks Grid -->

                <div id="tasksContainer"
                     class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                </div>

                <!-- Pagination -->

                <div id="pagination"
                     class="flex justify-center mt-8 gap-2">
                </div>

            </div>

        </div>

        <script>

            let currentPage = 0;

            function loadTasks(page = 0){

                currentPage = page;

                const search =
                    document.getElementById("search").value;

                const userId =
                    document.getElementById("userFilter").value;

                const completionType =
                    document.getElementById("completionType").value;

                fetch(`/admin/task/completedTasks/filter?search=${search}&userId=${userId}&completionType=${completionType}&page=${page}&size=10`)
                    .then(response => response.json())
                    .then(data => {

                        const container =
                            document.getElementById("tasksContainer");

                        container.innerHTML = "";

                        if(data.content.length === 0){

                            container.innerHTML = `
                                <div class="col-span-full bg-white rounded-3xl shadow p-16 text-center">

                                    <div class="text-4xl mb-3">
                                        📋
                                    </div>

                                    <h3 class="text-2xl font-semibold text-gray-700">
                                        No tasks found
                                    </h3>

                                    <p class="text-gray-500 mt-2">
                                        Try changing filters
                                    </p>

                                </div>
                            `;

                            renderPagination(data.totalPages);

                            return;
                        }

                        data.content.forEach(task => {

                            const badge =
                                task.result === "LATE"
                                ? `
                                <span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold">
                                    Late
                                </span>`
                                :
                                `
                                <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold">
                                    On Time
                                </span>`;

                            container.innerHTML += `

                            <a href="/admin/task/${task.taskId}/view"
                               class="bg-white rounded-3xl shadow hover:shadow-xl hover:-translate-y-1 transition-all duration-300 p-6 block">

                                <div class="flex justify-between items-start mb-4">

                                    <div>

                                        <h3 class="font-bold text-lg text-gray-800">
                                            ${task.taskTitle}
                                        </h3>

                                        <p class="text-sm text-gray-500 mt-1">
                                            ${task.employeeName}
                                        </p>

                                    </div>

                                    ${badge}

                                </div>

                                <div class="grid grid-cols-2 gap-4 text-sm">

                                    <div>

                                        <div class="text-gray-400">
                                            Deadline
                                        </div>

                                        <div class="font-medium text-gray-700 mt-1">
                                            ${task.deadline}
                                        </div>

                                    </div>

                                    <div>

                                        <div class="text-gray-400">
                                            Completed At
                                        </div>

                                        <div class="font-medium text-gray-700 mt-1">
                                            ${task.completedAt}
                                        </div>

                                    </div>

                                </div>

                            </a>

                            `;
                        });

                        renderPagination(data.totalPages);

                    });

            }

           function renderPagination(totalPages){

                const pagination =
                    document.getElementById("pagination");

                pagination.innerHTML = "";

                for(let i = 0; i < totalPages; i++){

                    pagination.innerHTML += `
                        <button
                            onclick="loadTasks(${i})"
                            class="${
                                currentPage === i
                                    ? 'px-4 py-2 rounded-xl bg-indigo-600 text-white'
                                    : 'px-4 py-2 rounded-xl border bg-white hover:bg-indigo-50'
                            }">
                            ${i + 1}
                        </button>
                    `;
                }
            }

            document.getElementById("search")
                .addEventListener("input",
                    () => loadTasks(0));

            document.getElementById("userFilter")
                .addEventListener("change",
                    () => loadTasks(0));

            document.getElementById("completionType")
                .addEventListener("change",
                    () => loadTasks(0));

            loadTasks();

        </script>

        </body>
</html>
